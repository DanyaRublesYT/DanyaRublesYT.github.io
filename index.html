```html
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта, мама ❤️</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ffb6d9,#ffdff2);
height:100vh;
overflow:hidden;
text-align:center;
color:white;
}

h1{
margin-top:25px;
font-size:28px;
text-shadow:0 4px 10px rgba(0,0,0,0.3);
}

#counter{
font-size:20px;
margin-top:5px;
margin-bottom:10px;
}

#game{
position:relative;
width:100%;
height:65vh;
overflow:hidden;
}

.heart{
position:absolute;
font-size:42px;
cursor:pointer;
user-select:none;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);}
100%{transform:translateY(90vh) rotate(360deg);}
}

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,.7);
backdrop-filter:blur(6px);
}

#card{
background:white;
color:#d81b75;
padding:25px;
border-radius:20px;
width:90%;
max-width:360px;
animation:pop .6s;
}

@keyframes pop{
0%{transform:scale(.5);opacity:0}
100%{transform:scale(1);opacity:1}
}

button{
margin-top:15px;
border:none;
background:#ff4fa3;
color:white;
padding:14px 20px;
font-size:16px;
border-radius:12px;
}

iframe{
margin-top:15px;
border-radius:15px;
}

</style>
</head>

<body>

<h1>🌸 С 8 Марта, мама 🌸</h1>
<div id="counter">Поймано: 0 / 5 ❤️</div>

<div id="game"></div>

<div id="popup">

<div id="card">

<h2>Мамочка ❤️</h2>

<p>
Поздравляю тебя с 8 Марта!  
Ты самая добрая, самая красивая и самая лучшая мама на свете.  
Спасибо за всё! Я тебя очень люблю!
</p>

<iframe width="100%" height="200"
src="https://www.youtube.com/embed/ZQNHhtHbd1s?start=17&autoplay=1"
title="Песня для мамы"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<button onclick="closePopup()">❤️ Люблю тебя</button>

</div>

</div>

<script>

let caught=0
const maxHearts=5
const game=document.getElementById("game")

function spawnHeart(){

const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"

heart.style.left=Math.random()*90+"vw"

const speed=4+Math.random()*3
heart.style.animationDuration=speed+"s"

heart.onclick=()=>{

heart.remove()

caught++

document.getElementById("counter").innerText=
"Поймано: "+caught+" / "+maxHearts+" ❤️"

if(caught>=maxHearts){
win()
}

}

game.appendChild(heart)

setTimeout(()=>{
heart.remove()
},speed*1000)

}

function win(){
document.getElementById("popup").style.display="flex"
}

function closePopup(){
document.getElementById("popup").style.display="none"
}

setInterval(spawnHeart,900)

</script>

</body>
</html>
```
